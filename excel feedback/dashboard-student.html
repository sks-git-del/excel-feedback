<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Feedback Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Student Dashboard Page -->
    <div id="student-page" class="page">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-container">
                <h1 class="navbar-title">Student Dashboard</h1>
                <button class="btn btn-danger" onclick="handleLogout()">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="container dashboard-container">
            <div class="dashboard-header">
                <h2>Feedback for Your Subjects</h2>
                <p id="student-info" class="info-text"></p>
            </div>

            <!-- Subjects Grid -->
            <div id="subjects-grid" class="subjects-grid">
                <!-- Subjects will be loaded here by JavaScript -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state" style="display: none;">
                <p>No subjects available for your semester.</p>
            </div>

            <!-- Loading Indicator -->
            <div id="loading" class="loading" style="display: none;">
                <p>Loading subjects...</p>
            </div>
        </div>

        <!-- Messages -->
        <div id="student-message" class="message"></div>
    </div>

    <!-- Firebase SDK (Compat for global firebase.* API) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

    <!-- Application Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/student.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
